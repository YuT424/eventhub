{% extends "base.html" %}
{% from "bootstrap5/form.html" import render_form %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <!-- Header -->
            <div class="d-flex align-items-center gap-3 mb-4">
                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 48px; height: 48px;">
                    <i class="bi bi-plus-lg fs-4"></i>
                </div>
                <div>
                    <h2 class="mb-0">Create New Event</h2>
                    <p class="text-muted small mb-0">Fill in the details below to publish your event</p>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    {{ render_form(form) }}
                </div>
            </div>

            <div class="text-center mt-3">
                <a href="{{ url_for('event.list_events') }}" class="text-decoration-none small">
                    <i class="bi bi-arrow-left"></i> Back to Events
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
